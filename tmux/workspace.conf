
# ==============================================================================
# workspace.conf
#
# 格式: 窗口名 | 路径 | pane1命令 | h:尺寸%:pane2命令 | v:尺寸%:pane3命令 | ...
#
# 分割规则:
#   h:30:cmd  → 对当前 active pane 水平分割，新 pane 占 30%，执行 cmd
#   v:50:cmd  → 对当前 active pane 垂直分割，新 pane 占 50%，执行 cmd
#   命令可为空: h:30:
#
# 分割示意（console 行为例）:
#   | (空) | h:30: | v:50:./top.sh
#
#   ┌───────────────┬────────────┐
#   │               │            │  ← h:30 分出右侧
#   │    pane1      ├────────────┤
#   │               │ ./top.sh   │  ← v:50 从右侧再分下方
#   └───────────────┴────────────┘
# ==============================================================================

editor   | ~/bleachserver      | vim
console  | ~/bleachserver/bin  |      | h:30: | v:50:./top.sh
admin    | ~ 				   |
status 	 | ~ 				   |
remote   | ~ 				   |
dev001   | ~/gameserver-v4.0   |
dev002   | ~/gameserver-v4.0   |
dev003   | ~/gameserver-v4.0   |
dev004   | ~/gameserver-v4.0   |
dev005   | ~/gameserver-v4.0   |
