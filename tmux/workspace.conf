# ==============================================================================
# workspace.conf  —  tmux workspace 配置文件
#
# 文件名即 session 名，例如此文件创建的 session 为 "workspace"
#
# 放置位置建议: ~/.config/tmux/workspace.conf
#              或任意路径，启动时传入: start_workspace.sh /path/to/workspace.conf
# ==============================================================================

# 窗口配置  格式: 窗口名 | 完整路径 | 布局
#
# 路径说明:
#   ~/server          → 支持 ~ 展开
#   $HOME/server      → 支持环境变量展开
#   /home/ryan/server → 绝对路径
#
# 布局类型:
#   none                          → 单 pane，无操作
#   cmd:<命令>                     → 单 pane，启动后执行命令
#   triple:<H%>:<V%>:<命令>       → 三 pane，右上 pane 执行命令
#   hsplit:<H%>:<左命令>:<右命令> → 两 pane 水平分割
#
# triple 布局示意:
#   ┌──────────┬──────────┐
#   │          │  pane2   │  ← 执行命令
#   │  pane1   ├──────────┤
#   │          │  pane3   │
#   └──────────┴──────────┘

editor   | ~/server      	   | cmd:vim
console  | ~/server/bin  	   | triple:30:30:./top.sh
admin    | ~/server       	   | none
status   | ~     			   | none
remote   | ~      			   | none
dev001   | ~/gameserver-v4.0   | none
dev002   | ~/gameserver-v4.0   | none
dev003   | ~/gameserver-v4.0   | none
dev004   | ~/gameserver-v4.0   | none
dev005   | ~/gameserver-v4.0   | none
